spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mentalcare
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mentalcare.domain
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
